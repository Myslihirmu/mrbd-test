<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Locked viewport: the MRBD display is a fixed 600x600 surface with no scroll/zoom. -->
<meta name="viewport" content="width=600,height=600,initial-scale=1,user-scalable=no">
<!-- Declares this as a Meta Ray-Ban Display web app. -->
<meta name="mrbd-web-app-capable" content="yes">
<meta name="description" content="MRBD Test Suite — exercises every device capability of the Meta Ray-Ban Display glasses: the five Neural Band keys, IMU motion/gyroscope, compass, GPS location & speed, the additive display, and local storage.">
<title>MRBD Test Suite</title>
<style>
  /*
   * DESIGN NOTES (why, not syntax):
   * - The display is ADDITIVE see-through: #000 = fully transparent. So the page is black
   *   and content uses bright, saturated strokes/text (cyan/green/amber). We avoid large
   *   bright fills everywhere EXCEPT the Display test, where glare is the thing being tested.
   * - Everything lives inside a hard 600x600 box with overflow hidden. Each screen is sized
   *   to fit without scrolling, because the glasses cannot scroll.
   * - Monospace + generous sizes (>=16px, primary >=24px) for legibility on-lens.
   */
  :root{
    --cyan:#19f0ff;       /* primary text / chrome */
    --cyan-dim:#0a8c96;   /* secondary labels */
    --green:#39ff88;      /* success / active */
    --amber:#ffb000;      /* highlight / warnings */
    --red:#ff4d4d;        /* errors */
    --magenta:#ff5cf0;
    --line:#0e5c63;       /* faint structural lines */
    --bg:#000;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    width:100%;height:100%;
    background:#000;            /* outside the lens box, also black */
    overflow:hidden;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    color:var(--cyan);
    -webkit-user-select:none;user-select:none;
    display:flex;align-items:center;justify-content:center;
  }
  /* The lens: exactly the device surface. Centered so it also tests cleanly in a browser. */
  #lens{
    width:600px;height:600px;
    background:var(--bg);
    overflow:hidden;position:relative;
    display:flex;flex-direction:column;
  }
  header{
    flex:0 0 auto;padding:12px 18px 8px;
    border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:baseline;
  }
  header .title{font-size:24px;color:var(--cyan);letter-spacing:1px}
  header .crumb{font-size:16px;color:var(--amber)}
  #content{flex:1 1 auto;position:relative;overflow:hidden;padding:14px 18px}
  footer{
    flex:0 0 auto;border-top:1px solid var(--line);
    padding:8px 18px 12px;font-size:16px;
  }
  footer .hint{color:var(--cyan-dim)}
  footer .hint b{color:var(--green)}
  footer .keystrip{margin-top:4px;color:var(--cyan)}
  footer .keystrip .lk{color:var(--amber)}

  /* ---- Home menu ---- */
  .menu{display:flex;flex-direction:column;gap:6px;margin-top:2px}
  .menu .item{
    border:1px solid var(--line);border-radius:8px;
    padding:6px 14px;display:flex;justify-content:space-between;align-items:center;
  }
  .menu .item.sel{border-color:var(--green);background:rgba(57,255,136,0.06)}
  .menu .item .name{font-size:24px}
  .menu .item.sel .name{color:var(--green)}
  .menu .item .desc{font-size:16px;color:var(--cyan-dim);max-width:260px;text-align:right;white-space:nowrap}

  /* ---- Generic readout grid ---- */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px}
  .row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;border-bottom:1px dotted var(--line);padding-bottom:3px}
  .row .k{font-size:16px;color:var(--cyan-dim);flex-shrink:0}
  .row .v{font-size:20px;color:var(--cyan);text-align:right;min-width:0;word-break:break-word}
  .screen-title{font-size:22px;color:var(--amber);margin-bottom:10px}
  .status{font-size:16px;margin-bottom:10px}
  .status.ok{color:var(--green)}
  .status.warn{color:var(--amber)}
  .status.err{color:var(--red)}

  /* ---- Gesture / keys diagram ---- */
  .pad{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
       gap:10px;width:380px;height:300px;margin:6px auto 0}
  .cell{border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;
        align-items:center;justify-content:center;gap:4px}
  .cell.spacer{border:none}
  .cell .lbl{font-size:22px;color:var(--cyan)}
  .cell .cnt{font-size:16px;color:var(--cyan-dim)}
  .cell.hit{border-color:var(--green);background:rgba(57,255,136,0.12)}
  .cell.hit .lbl{color:var(--green)}
  .lastev{font-size:16px;color:var(--cyan-dim);text-align:center;margin-top:8px}
  .lastev b{color:var(--amber)}

  /* ---- Motion visuals ---- */
  .viz-row{display:flex;gap:24px;justify-content:center;margin-bottom:10px}
  .viz{width:140px;height:140px;position:relative}
  .viz .cap{position:absolute;bottom:-2px;width:100%;text-align:center;font-size:16px;color:var(--cyan-dim)}
  .ring{position:absolute;inset:0;border:1px solid var(--line);border-radius:50%}
  .crosshair::before,.crosshair::after{content:"";position:absolute;background:var(--line)}
  .crosshair::before{left:50%;top:8px;bottom:8px;width:1px;transform:translateX(-0.5px)}
  .crosshair::after{top:50%;left:8px;right:8px;height:1px;transform:translateY(-0.5px)}
  .bubble{position:absolute;width:18px;height:18px;border-radius:50%;
          border:2px solid var(--green);left:50%;top:50%;transform:translate(-50%,-50%);
          transition:transform .05s linear}
  .needle{position:absolute;left:50%;top:50%;width:2px;height:56px;background:var(--amber);
          transform-origin:bottom center;transform:translate(-50%,-100%);transition:transform .08s linear}
  .nlabel{position:absolute;width:100%;text-align:center;font-size:14px;color:var(--cyan-dim);top:2px}

  /* ---- Display test patterns ---- */
  .pattern{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .pat-name{position:absolute;top:8px;left:0;right:0;text-align:center;font-size:18px;color:var(--amber);z-index:5}
  .pat-warn{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:16px;color:var(--red);z-index:5}
  .bars{display:flex;width:100%;height:70%}
  .bars span{flex:1}
  .ladder{display:flex;flex-direction:column;gap:6px;color:var(--cyan)}
  .safezone{position:absolute;inset:24px;border:1px solid var(--green)}
  .thirds::before,.thirds::after{content:"";position:absolute;background:var(--line)}
  .center-dot{width:10px;height:10px;border-radius:50%;background:var(--cyan)}
  .big{font-size:120px;line-height:1;color:var(--green)}

  /* ---- Audio test ---- */
  .freqval{font-size:56px;color:var(--green);text-align:center;margin:6px 0 16px}
  .panbar{position:relative;height:38px;border:1px solid var(--line);border-radius:19px;
          margin:0 6px 4px;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
  .panbar .pl,.panbar .pr{font-size:18px;color:var(--cyan-dim)}
  .pandot{position:absolute;width:16px;height:16px;border-radius:50%;background:var(--amber);
          top:50%;left:50%;transform:translate(-50%,-50%);transition:left .05s linear}
  .pancap{text-align:center;font-size:16px;color:var(--cyan-dim);margin-bottom:14px}

  /* ---- Capabilities probes ---- */
  .gray{font-size:16px;color:var(--amber);margin:-4px 0 10px;
        border:1px solid var(--amber);border-radius:6px;padding:5px 8px;display:inline-block}
  .loglist{font-size:16px;color:var(--cyan);margin-top:10px;line-height:1.55}
  .loglist .t{color:var(--cyan-dim)}
  .loglist .empty{color:var(--cyan-dim)}
  .yes{color:var(--green)} .no{color:var(--cyan-dim)}
</style>
</head>
<body>
<div id="lens">
  <header>
    <span class="title">MRBD TEST SUITE</span>
    <span class="crumb" id="crumb">Home</span>
  </header>
  <div id="content"><!-- screens render here --></div>
  <footer>
    <div class="hint" id="hint">↑↓ Move · Enter Open</div>
    <div class="keystrip">last key: <span class="lk" id="lastkey">—</span> · presses: <span id="totalpresses">0</span></div>
  </footer>
</div>

<script>
"use strict";
/* =========================================================================
 * MRBD Test Suite — single-file, no backend, no secrets.
 *
 * State machine of "screens". Navigation uses ONLY the 5 keys the glasses
 * emit (the Neural Band maps swipes/pinches to ArrowUp/Down/Left/Right/Enter).
 *
 * Convention:
 *   Home:        Up/Down select, Enter opens.
 *   Most tests:  Left = back to Home; other keys do test-specific things.
 *   Gesture test exception: Left must remain testable there, so it does NOT
 *     navigate; you exit that screen with a DOUBLE Enter instead. This is the
 *     only overloaded key, and it's shown in the on-screen hint.
 * ========================================================================= */

const KEYS = ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Enter"];

const SCREENS = [
  {id:"gesture", name:"Gesture & Keys", desc:"5 Neural Band keys"},
  {id:"motion",  name:"Motion / IMU",   desc:"Accel + gyro"},
  {id:"orient",  name:"Orientation",    desc:"Tilt + compass"},
  {id:"gps",     name:"GPS & Speed",    desc:"Location & speed"},
  {id:"audio",   name:"Audio Output",   desc:"Speaker / tone test"},
  {id:"display", name:"Display & Color",desc:"Display patterns"},
  {id:"storage", name:"Storage",        desc:"Persistence test"},
  {id:"info",    name:"Device Info",    desc:"Environment"},
  {id:"caps",    name:"Capabilities",   desc:"⚠ Unverified probes"},
];

// Sub-menu under "Capabilities": gray-area APIs the device brief never confirmed.
// Each is flagged UNVERIFIED on its screen so on-glasses results are read as discoveries.
const CAPS = [
  {id:"autodetect", name:"Auto-detect",        desc:"Feature support flags"},
  {id:"haptics",    name:"Haptics & Speech",   desc:"Vibrate + TTS"},
  {id:"lifecycle",  name:"Display & Lifecycle",desc:"Wake lock · FPS · focus"},
  {id:"sensors2",   name:"Sensors & Battery",  desc:"Light · battery · net · XR"},
  {id:"netfetch",   name:"Network Fetch",      desc:"Connectivity test"},
  {id:"keylog",     name:"Raw Key Logger",     desc:"Any/all key events"},
];

// Back-navigation: a screen returns to its parent (default Home). Caps sub-screens
// return to the Caps sub-menu; the Caps sub-menu returns Home.
const PARENT = {caps:"home"};
CAPS.forEach(c=>{ PARENT[c.id]="caps"; });
function back(){ navigateTo(PARENT[S.screen]||"home"); }

const S = {
  screen:"home",
  menuIndex:0,
  keyCounts:{ArrowUp:0,ArrowDown:0,ArrowLeft:0,ArrowRight:0,Enter:0},
  totalPresses:0,
  lastKey:"—",
  // live sensor buffers (latest reading; painted by a rAF loop while relevant)
  motion:{ax:null,ay:null,az:null,lx:null,ly:null,lz:null,rr_a:null,rr_b:null,rr_g:null,interval:null,got:false},
  orient:{alpha:null,beta:null,gamma:null,compass:null,got:false},
  // gps
  gps:{watchId:null,fix:null,prev:null,calcSpeed:null,updates:0,error:null},
  // audio output probe (Web Audio API)
  audio:{ctx:null,osc:null,gain:null,pan:null,playing:false,freq:440},
  // display test
  patternIndex:0,
  // gesture exit
  lastEnter:0,
  // capabilities sub-menu + probe buffers
  capsIndex:0,
  caps:{
    wakeLock:null, wakeState:"—",
    fps:0, frames:0, fpsLast:0,
    lifelog:[],
    battery:null, batteryState:"—",
    light:null, ambientSensor:null,
    xr:"checking…",
    fetchEndpoint:0, fetchResult:"press Enter to run",
    keys:[], keyDownAt:{},
  },
  // raf
  raf:null,
  motionAttached:false,
};

const content = document.getElementById("content");
const crumb = document.getElementById("crumb");
const hint = document.getElementById("hint");
const lastkeyEl = document.getElementById("lastkey");
const totalEl = document.getElementById("totalpresses");

/* ---------- small helpers ---------- */
const el = (id) => document.getElementById(id);
function fmt(n, d=2){ return (n===null||n===undefined||Number.isNaN(n)) ? "—" : Number(n).toFixed(d); }
function deg(n){ return (n===null||n===undefined) ? "—" : Math.round(n)+"°"; }

/* =========================================================================
 * INPUT — the single source of truth for all interaction.
 * ========================================================================= */
window.addEventListener("keydown",(e)=>{
  // The Raw Key Logger screen captures EVERYTHING (to surface any undocumented input);
  // every other screen only reacts to the 5 known keys.
  if(S.screen==="keylog"){ e.preventDefault(); logRawKey(e,"down"); }
  if(!KEYS.includes(e.key)) return;
  e.preventDefault();          // arrows must not scroll / move focus
  registerKey(e.key);
  dispatch(e.key);
},{passive:false});
window.addEventListener("keyup",(e)=>{ if(S.screen==="keylog") logRawKey(e,"up"); });

function registerKey(k){
  S.keyCounts[k]++;
  S.totalPresses++;
  S.lastKey=k;
  lastkeyEl.textContent=k;
  totalEl.textContent=S.totalPresses;
}

function dispatch(k){
  switch(S.screen){
    case "home":    return onHome(k);
    case "gesture": return onGesture(k);
    case "motion":  return onMotionScreen(k);
    case "orient":  return onMotionScreen(k); // shares back/enable handling
    case "gps":     return onGps(k);
    case "audio":   return onAudio(k);
    case "display": return onDisplay(k);
    case "storage": return onStorage(k);
    case "info":    return onInfo(k);
    case "caps":       return onCaps(k);
    case "autodetect": return onSimpleBack(k);
    case "haptics":    return onHaptics(k);
    case "lifecycle":  return onLifecycle(k);
    case "sensors2":   return onSensors2(k);
    case "netfetch":   return onNetFetch(k);
    case "keylog":     return onKeylog(k);
  }
}

/* =========================================================================
 * NAVIGATION
 * ========================================================================= */
function navigateTo(id){
  teardown(S.screen);   // stop sensors/loops from the screen we are leaving
  S.screen=id;
  const meta = SCREENS.find(s=>s.id===id) || CAPS.find(s=>s.id===id);
  crumb.textContent = id==="home" ? "Home" : (meta?meta.name:id);
  render();
}
function goHome(){ navigateTo("home"); }

function teardown(prev){
  if(S.raf){ cancelAnimationFrame(S.raf); S.raf=null; }
  if((prev==="motion"||prev==="orient") && S.motionAttached){
    window.removeEventListener("devicemotion",onDeviceMotion);
    window.removeEventListener("deviceorientation",onDeviceOrientation);
    S.motionAttached=false;
  }
  if(prev==="gps" && S.gps.watchId!==null){
    navigator.geolocation.clearWatch(S.gps.watchId);
    S.gps.watchId=null;
  }
  if(prev==="audio"){ stopTone(); }   // never let a tone keep playing off-screen
  if(prev==="haptics"){ try{ window.speechSynthesis&&speechSynthesis.cancel(); }catch(e){} }
  if(prev==="lifecycle"){ removeLifecycleListeners(); releaseWakeLock(); }
  if(prev==="sensors2"){ stopAmbientLight(); }
}

/* =========================================================================
 * RENDER dispatcher
 * ========================================================================= */
function render(){
  switch(S.screen){
    case "home":    return renderHome();
    case "gesture": return renderGesture();
    case "motion":  return renderMotion();
    case "orient":  return renderOrient();
    case "gps":     return renderGps();
    case "audio":   return renderAudio();
    case "display": return renderDisplay();
    case "storage": return renderStorage();
    case "info":    return renderInfo();
    case "caps":       return renderCaps();
    case "autodetect": return renderAutodetect();
    case "haptics":    return renderHaptics();
    case "lifecycle":  return renderLifecycle();
    case "sensors2":   return renderSensors2();
    case "netfetch":   return renderNetFetch();
    case "keylog":     return renderKeylog();
  }
}
function setHint(h){ hint.innerHTML=h; }

/* =========================================================================
 * HOME
 * ========================================================================= */
function renderHome(){
  setHint("↑↓ Move · <b>Enter</b> Open");
  let html='<div class="menu">';
  SCREENS.forEach((s,i)=>{
    html+=`<div class="item ${i===S.menuIndex?'sel':''}">
      <span class="name">${s.name}</span><span class="desc">${s.desc}</span></div>`;
  });
  html+='</div>';
  content.innerHTML=html;
}
function onHome(k){
  if(k==="ArrowUp"){ S.menuIndex=(S.menuIndex-1+SCREENS.length)%SCREENS.length; renderHome(); }
  else if(k==="ArrowDown"){ S.menuIndex=(S.menuIndex+1)%SCREENS.length; renderHome(); }
  else if(k==="Enter"||k==="ArrowRight"){ navigateTo(SCREENS[S.menuIndex].id); }
}

/* =========================================================================
 * GESTURE & KEYS  — proves all 5 inputs fire; exit via double-Enter.
 * ========================================================================= */
function renderGesture(){
  setHint("Press any key to test · <b>Enter ×2</b> = Back");
  content.innerHTML=`
    <div class="pad">
      ${cell("spacer")}${cell("ArrowUp","▲ Up")}${cell("spacer")}
      ${cell("ArrowLeft","◀ Left")}${cell("Enter","● Enter")}${cell("ArrowRight","Right ▶")}
      ${cell("spacer")}${cell("ArrowDown","▼ Down")}${cell("spacer")}
    </div>
    <div class="lastev" id="lastev">waiting for input…</div>`;
  paintGesture();
}
function cell(k,label){
  if(k==="spacer") return '<div class="cell spacer"></div>';
  return `<div class="cell" id="kc-${k}">
            <span class="lbl">${label}</span>
            <span class="cnt" id="cnt-${k}">0</span>
          </div>`;
}
function paintGesture(){
  KEYS.forEach(k=>{ const c=el("cnt-"+k); if(c) c.textContent=S.keyCounts[k]; });
}
function onGesture(k){
  // flash the pressed cell
  const cellEl=el("kc-"+k);
  if(cellEl){ cellEl.classList.add("hit"); setTimeout(()=>cellEl.classList.remove("hit"),140); }
  el("cnt-"+k) && (el("cnt-"+k).textContent=S.keyCounts[k]);
  const ev=el("lastev");
  if(ev) ev.innerHTML=`last: <b>${k}</b> · total presses on this key: <b>${S.keyCounts[k]}</b>`;

  // double-Enter exits (single Enter still counts as a real test of the Enter key)
  if(k==="Enter"){
    const now=performance.now();
    if(now-S.lastEnter<450){ goHome(); }
    S.lastEnter=now;
  }
}

/* =========================================================================
 * MOTION / IMU  (accelerometer + gyroscope rotation rate)
 * ========================================================================= */
function renderMotion(){
  setHint("◀ Back · <b>Enter</b> Enable sensors");
  content.innerHTML=`
    <div class="screen-title">Accelerometer & Gyroscope</div>
    <div class="status warn" id="mstat">Press Enter to enable motion sensors.</div>
    <div class="grid">
      ${rrow("accel.x (g)","m-ax")}${rrow("rot α °/s","m-ra")}
      ${rrow("accel.y (g)","m-ay")}${rrow("rot β °/s","m-rb")}
      ${rrow("accel.z (g)","m-az")}${rrow("rot γ °/s","m-rg")}
      ${rrow("linear.x","m-lx")}${rrow("linear.y","m-ly")}
      ${rrow("linear.z","m-lz")}${rrow("interval ms","m-int")}
    </div>`;
  startLoop(paintMotion);
}
function renderOrient(){
  setHint("◀ Back · <b>Enter</b> Enable sensors");
  content.innerHTML=`
    <div class="screen-title">Tilt & Compass</div>
    <div class="status warn" id="mstat">Press Enter to enable orientation sensors.</div>
    <div class="viz-row">
      <div class="viz">
        <div class="ring crosshair"></div>
        <div class="bubble" id="o-bubble"></div>
        <div class="cap">tilt (β/γ)</div>
      </div>
      <div class="viz">
        <div class="ring"></div>
        <div class="nlabel">N</div>
        <div class="needle" id="o-needle"></div>
        <div class="cap">compass</div>
      </div>
    </div>
    <div class="grid">
      ${rrow("alpha (Z) °","o-a")}${rrow("beta (X) °","o-b")}
      ${rrow("gamma (Y) °","o-g")}${rrow("heading °","o-h")}
    </div>`;
  startLoop(paintOrient);
}
function rrow(label,id){ return `<div class="row"><span class="k">${label}</span><span class="v" id="${id}">—</span></div>`; }

function onMotionScreen(k){
  if(k==="ArrowLeft") return goHome();
  if(k==="Enter") return enableMotion();
}

async function enableMotion(){
  const stat=el("mstat");
  try{
    // iOS / WebKit require an explicit permission request triggered by a user gesture.
    // On the glasses (and most Android/desktop) these functions don't exist; we just attach.
    if(typeof DeviceMotionEvent!=="undefined" && typeof DeviceMotionEvent.requestPermission==="function"){
      const r=await DeviceMotionEvent.requestPermission();
      if(r!=="granted") throw new Error("motion permission "+r);
    }
    if(typeof DeviceOrientationEvent!=="undefined" && typeof DeviceOrientationEvent.requestPermission==="function"){
      await DeviceOrientationEvent.requestPermission();
    }
    if(!S.motionAttached){
      window.addEventListener("devicemotion",onDeviceMotion);
      window.addEventListener("deviceorientation",onDeviceOrientation);
      S.motionAttached=true;
    }
    if(stat){ stat.className="status ok"; stat.textContent="Sensors enabled — move the glasses…"; }
    // If no event arrives shortly, the platform likely lacks IMU access.
    setTimeout(()=>{
      const got = S.motion.got || S.orient.got;
      if(!got && stat){ stat.className="status err"; stat.textContent="No sensor data received (unsupported or blocked)."; }
    },2500);
  }catch(err){
    if(stat){ stat.className="status err"; stat.textContent="Error: "+err.message; }
  }
}
function onDeviceMotion(e){
  const m=S.motion; m.got=true;
  const ag=e.accelerationIncludingGravity||{}, a=e.acceleration||{}, r=e.rotationRate||{};
  m.ax=ag.x; m.ay=ag.y; m.az=ag.z;
  m.lx=a.x; m.ly=a.y; m.lz=a.z;
  m.rr_a=r.alpha; m.rr_b=r.beta; m.rr_g=r.gamma;
  m.interval=e.interval;
}
function onDeviceOrientation(e){
  const o=S.orient; o.got=true;
  o.alpha=e.alpha; o.beta=e.beta; o.gamma=e.gamma;
  // iOS exposes a true compass heading; elsewhere approximate from alpha.
  o.compass = (typeof e.webkitCompassHeading==="number")
      ? e.webkitCompassHeading
      : (e.alpha!=null ? (360-e.alpha)%360 : null);
}
function paintMotion(){
  const m=S.motion;
  set("m-ax",fmt(m.ax)); set("m-ay",fmt(m.ay)); set("m-az",fmt(m.az));
  set("m-lx",fmt(m.lx)); set("m-ly",fmt(m.ly)); set("m-lz",fmt(m.lz));
  set("m-ra",fmt(m.rr_a,1)); set("m-rb",fmt(m.rr_b,1)); set("m-rg",fmt(m.rr_g,1));
  set("m-int",fmt(m.interval,0));
}
function paintOrient(){
  const o=S.orient;
  set("o-a",deg(o.alpha)); set("o-b",deg(o.beta)); set("o-g",deg(o.gamma)); set("o-h",deg(o.compass));
  const bub=el("o-bubble");
  if(bub){ // map tilt to a bubble offset, clamped to the ring
    const x=Math.max(-55,Math.min(55,(o.gamma||0)));
    const y=Math.max(-55,Math.min(55,(o.beta||0)));
    bub.style.transform=`translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
  }
  const nd=el("o-needle");
  if(nd){ nd.style.transform=`translate(-50%,-100%) rotate(${o.compass||0}deg)`; }
}
function set(id,v){ const e=el(id); if(e) e.textContent=v; }
function startLoop(paintFn){
  const tick=()=>{ paintFn(); S.raf=requestAnimationFrame(tick); };
  S.raf=requestAnimationFrame(tick);
}

/* =========================================================================
 * GPS & SPEED
 * ========================================================================= */
function renderGps(){
  setHint("◀ Back · <b>Enter</b> Start/Stop");
  content.innerHTML=`
    <div class="screen-title">Location & Speed</div>
    <div class="status warn" id="gstat">Press Enter to start GPS.</div>
    <div class="grid">
      ${rrow("latitude","g-lat")}${rrow("longitude","g-lon")}
      ${rrow("accuracy m","g-acc")}${rrow("altitude m","g-alt")}
      ${rrow("speed km/h","g-spd")}${rrow("heading °","g-hdg")}
      ${rrow("calc km/h","g-cspd")}${rrow("updates","g-upd")}
    </div>`;
  // speed: coords.speed is often null, so we always show a haversine-derived fallback.
}
function onGps(k){
  if(k==="ArrowLeft") return goHome();
  if(k==="Enter") return toggleGps();
}
function toggleGps(){
  const stat=el("gstat");
  if(S.gps.watchId!==null){
    navigator.geolocation.clearWatch(S.gps.watchId);
    S.gps.watchId=null;
    if(stat){ stat.className="status warn"; stat.textContent="GPS stopped. Enter to restart."; }
    return;
  }
  if(!("geolocation" in navigator)){
    if(stat){ stat.className="status err"; stat.textContent="Geolocation not supported."; }
    return;
  }
  if(stat){ stat.className="status warn"; stat.textContent="Acquiring fix…"; }
  S.gps.prev=null; S.gps.updates=0;
  S.gps.watchId=navigator.geolocation.watchPosition(onGpsFix,onGpsErr,{
    enableHighAccuracy:true, maximumAge:0, timeout:15000
  });
}
function onGpsFix(pos){
  const c=pos.coords; S.gps.updates++;
  const stat=el("gstat");
  if(stat){ stat.className="status ok"; stat.textContent="Tracking — Enter to stop."; }
  set("g-lat",fmt(c.latitude,5)); set("g-lon",fmt(c.longitude,5));
  set("g-acc",fmt(c.accuracy,0)); set("g-alt",fmt(c.altitude,0));
  set("g-spd", c.speed!=null ? fmt(c.speed*3.6,1) : "—");   // m/s -> km/h
  set("g-hdg", c.heading!=null ? deg(c.heading) : "—");
  set("g-upd", S.gps.updates);
  // Fallback speed from successive fixes (haversine / dt).
  const now=pos.timestamp;
  if(S.gps.prev){
    const d=haversine(S.gps.prev.lat,S.gps.prev.lon,c.latitude,c.longitude);
    const dt=(now-S.gps.prev.t)/1000;
    if(dt>0){ const kmh=(d/dt)*3.6; set("g-cspd",fmt(kmh,1)); }
  }
  S.gps.prev={lat:c.latitude,lon:c.longitude,t:now};
}
function onGpsErr(err){
  const stat=el("gstat");
  const map={1:"permission denied",2:"position unavailable",3:"timeout"};
  if(stat){ stat.className="status err"; stat.textContent="GPS error: "+(map[err.code]||err.message); }
}
function haversine(la1,lo1,la2,lo2){
  const R=6371000,toR=Math.PI/180;
  const dLa=(la2-la1)*toR,dLo=(lo2-lo1)*toR;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*toR)*Math.cos(la2*toR)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(a)); // metres
}

/* =========================================================================
 * AUDIO OUTPUT  — probe whether the glasses' speakers can be driven.
 *
 * Pure Web Audio API (oscillator -> gain -> stereo panner -> destination).
 * Needs no permission, but a browser AudioContext can only START from a user
 * gesture — so it's created/resumed on the Enter press, never on render.
 * The AudioContext.state readout is the real diagnostic: if it stays
 * "suspended"/"interrupted" instead of "running", the sandbox is blocking output.
 * ========================================================================= */
function renderAudio(){
  setHint("◀ Back · ↑↓ Frequency · <b>Enter</b> Play/Stop");
  const supported = !!(window.AudioContext||window.webkitAudioContext);
  content.innerHTML=`
    <div class="screen-title">Audio Output (speaker test)</div>
    <div class="status warn" id="astat">${supported?"Press Enter to play a test tone.":"Web Audio API not supported."}</div>
    <div class="freqval" id="a-freq">${S.audio.freq} Hz</div>
    <div class="panbar"><span class="pl">L</span><div class="pandot" id="a-dot"></div><span class="pr">R</span></div>
    <div class="pancap">stereo auto-pan while playing</div>
    <div class="grid">
      ${rrow("playing","a-play")}${rrow("context state","a-state")}
      ${rrow("volume","a-vol")}${rrow("Web Audio","a-sup")}
    </div>`;
  set("a-sup", supported?"yes":"no");
  startLoop(paintAudio);
}
function onAudio(k){
  if(k==="ArrowLeft") return goHome();
  if(k==="Enter")     return toggleTone();
  if(k==="ArrowUp")   return changeFreq(110);
  if(k==="ArrowDown") return changeFreq(-110);
}
function changeFreq(d){
  const a=S.audio;
  a.freq=Math.max(110,Math.min(1980,a.freq+d));
  if(a.playing&&a.osc&&a.ctx) a.osc.frequency.setValueAtTime(a.freq,a.ctx.currentTime);
  set("a-freq",a.freq+" Hz");
}
function toggleTone(){
  const a=S.audio, stat=el("astat");
  if(a.playing){ stopTone(); if(stat){stat.className="status warn";stat.textContent="Stopped. Enter to play again.";} return; }
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC){ if(stat){stat.className="status err";stat.textContent="Web Audio not supported.";} return; }
    if(!a.ctx) a.ctx=new AC();
    if(a.ctx.state==="suspended") a.ctx.resume();
    const ctx=a.ctx;
    a.osc=ctx.createOscillator(); a.osc.type="sine";
    a.osc.frequency.setValueAtTime(a.freq,ctx.currentTime);
    a.gain=ctx.createGain();      // soft fade-in avoids a click; modest level for open-ear speakers
    a.gain.gain.setValueAtTime(0.0001,ctx.currentTime);
    a.gain.gain.exponentialRampToValueAtTime(0.15,ctx.currentTime+0.05);
    if(ctx.createStereoPanner){ a.pan=ctx.createStereoPanner(); a.osc.connect(a.gain); a.gain.connect(a.pan); a.pan.connect(ctx.destination); }
    else { a.pan=null; a.osc.connect(a.gain); a.gain.connect(ctx.destination); }
    a.osc.start();
    a.playing=true;
    if(stat){ stat.className="status ok"; stat.textContent="Playing — do you hear it on the glasses?"; }
    // If the context refuses to run, that's the definitive "output blocked" signal.
    setTimeout(()=>{ if(a.ctx&&a.ctx.state!=="running"&&stat){ stat.className="status err"; stat.textContent="Context state: "+a.ctx.state+" — output likely blocked."; } },400);
  }catch(err){ if(stat){stat.className="status err";stat.textContent="Error: "+err.message;} }
}
function stopTone(){
  const a=S.audio;
  try{ if(a.gain&&a.ctx){ a.gain.gain.cancelScheduledValues(a.ctx.currentTime); a.gain.gain.setValueAtTime(a.gain.gain.value||0.15,a.ctx.currentTime); a.gain.gain.exponentialRampToValueAtTime(0.0001,a.ctx.currentTime+0.05); } }catch(e){}
  try{ if(a.osc) a.osc.stop((a.ctx?a.ctx.currentTime:0)+0.06); }catch(e){}
  a.playing=false; a.osc=null;
}
function paintAudio(){
  const a=S.audio;
  set("a-play", a.playing?"yes":"no");
  set("a-state", a.ctx?a.ctx.state:"—");
  set("a-vol", a.playing?"15%":"—");
  const dot=el("a-dot");
  if(a.playing && a.pan && a.ctx){
    const p=Math.sin(a.ctx.currentTime*2*Math.PI/3);   // ~3s left/right sweep
    a.pan.pan.setValueAtTime(p,a.ctx.currentTime);
    if(dot) dot.style.left=((p+1)/2*100)+"%";
  } else if(dot){ dot.style.left="50%"; }
}

/* ---- Display & Lifecycle: wake lock, FPS, look-away/sleep behaviour ---- */
function renderLifecycle(){
  setHint("◀ Back · <b>Enter</b> Toggle wake lock");
  content.innerHTML=`
    <div class="screen-title">Display & Lifecycle</div>${GRAY}
    <div class="grid">
      ${rrow("wake lock","lc-wake")}${rrow("render FPS","lc-fps")}
      ${rrow("visibility","lc-vis")}${rrow("has focus","lc-foc")}
    </div>
    <div class="loglist" id="lc-log"></div>`;
  S.caps.fpsLast=performance.now(); S.caps.frames=0;
  addLifecycleListeners();
  startLoop(paintLifecycle);
}
function onLifecycle(k){
  if(k==="ArrowLeft") return back();
  if(k==="Enter") return toggleWakeLock();
}
function paintLifecycle(){
  const c=S.caps, now=performance.now();
  c.frames++;
  if(now-c.fpsLast>=500){ c.fps=Math.round(c.frames*1000/(now-c.fpsLast)); c.frames=0; c.fpsLast=now; }
  set("lc-fps", c.fps||"…");
  set("lc-wake", c.wakeState);
  set("lc-vis", document.visibilityState);
  set("lc-foc", document.hasFocus()?"yes":"no");
  const log=el("lc-log");
  if(log) log.innerHTML = c.lifelog.length
    ? c.lifelog.slice(-6).map(e=>`<span class="t">${e.t}</span> ${e.m}`).join("<br>")
    : '<span class="empty">look away / let the display sleep — events log here…</span>';
}
function lcLog(m){ const d=new Date(); S.caps.lifelog.push({t:d.toLocaleTimeString(),m}); if(S.caps.lifelog.length>20) S.caps.lifelog.shift(); }
const LIFE={
  vis:()=>lcLog("visibility → "+document.visibilityState),
  focus:()=>lcLog("focus"), blur:()=>lcLog("blur"),
  pagehide:()=>lcLog("pagehide"), pageshow:()=>lcLog("pageshow"),
  freeze:()=>lcLog("freeze"), resume:()=>lcLog("resume"),
};
function addLifecycleListeners(){
  document.addEventListener("visibilitychange",LIFE.vis);
  window.addEventListener("focus",LIFE.focus); window.addEventListener("blur",LIFE.blur);
  window.addEventListener("pagehide",LIFE.pagehide); window.addEventListener("pageshow",LIFE.pageshow);
  document.addEventListener("freeze",LIFE.freeze); document.addEventListener("resume",LIFE.resume);
}
function removeLifecycleListeners(){
  document.removeEventListener("visibilitychange",LIFE.vis);
  window.removeEventListener("focus",LIFE.focus); window.removeEventListener("blur",LIFE.blur);
  window.removeEventListener("pagehide",LIFE.pagehide); window.removeEventListener("pageshow",LIFE.pageshow);
  document.removeEventListener("freeze",LIFE.freeze); document.removeEventListener("resume",LIFE.resume);
}
async function toggleWakeLock(){
  const c=S.caps;
  if(c.wakeLock) return releaseWakeLock();
  if(!('wakeLock' in navigator)){ c.wakeState="not supported"; return; }
  try{
    c.wakeLock=await navigator.wakeLock.request('screen');
    c.wakeState="held ✓"; lcLog("wakeLock acquired");
    c.wakeLock.addEventListener('release',()=>{ c.wakeState="released"; c.wakeLock=null; lcLog("wakeLock released"); });
  }catch(e){ c.wakeState="error ("+e.name+")"; lcLog("wakeLock error: "+e.message); }
}
function releaseWakeLock(){
  const c=S.caps;
  try{ if(c.wakeLock) c.wakeLock.release(); }catch(e){}
  c.wakeLock=null;
  if(c.wakeState==="held ✓") c.wakeState="released";
}

  }catch(e){}
}
function stopAmbientLight(){ try{ if(S.caps.ambientSensor) S.caps.ambientSensor.stop(); }catch(e){} S.caps.ambientSensor=null; }
function checkXR(){
  if(!('xr' in navigator)){ S.caps.xr="no WebXR"; return; }
  try{ navigator.xr.isSessionSupported('immersive-ar')
        .then(s=>{ S.caps.xr=s?"supported":"not supported"; })
        .catch(()=>{ S.caps.xr="error"; }); }
  catch(e){ S.caps.xr="error"; }
}

/* ---- Network Fetch: real connectivity / latency / CORS ---- */
const FETCH_ENDPOINTS=[
  {name:"same-origin (this app)", url:()=>location.href.split('#')[0].split('?')[0]+"?_="+Date.now()},
  {name:"api.github.com/zen",     url:()=>"https://api.github.com/zen?_="+Date.now()},
  {name:"cloudflare trace",       url:()=>"https://www.cloudflare.com/cdn-cgi/trace?_="+Date.now()},
];
function renderNetFetch(){
  setHint("◀ Back · ↑↓ Endpoint · <b>Enter</b> Run");
  content.innerHTML=`
    <div class="screen-title">Network Fetch</div>${GRAY}
    <div class="grid">
      ${rrow("endpoint","nf-ep")}${rrow("status","nf-st")}
      ${rrow("latency ms","nf-ms")}${rrow("bytes","nf-by")}
    </div>
    <div class="loglist" id="nf-out"><span class="empty">pick an endpoint, press Enter…</span></div>`;
  set("nf-ep", FETCH_ENDPOINTS[S.caps.fetchEndpoint].name);
}
function onNetFetch(k){
  if(k==="ArrowLeft") return back();
  if(k==="ArrowUp"){ S.caps.fetchEndpoint=(S.caps.fetchEndpoint-1+FETCH_ENDPOINTS.length)%FETCH_ENDPOINTS.length; set("nf-ep",FETCH_ENDPOINTS[S.caps.fetchEndpoint].name); }
  if(k==="ArrowDown"){ S.caps.fetchEndpoint=(S.caps.fetchEndpoint+1)%FETCH_ENDPOINTS.length; set("nf-ep",FETCH_ENDPOINTS[S.caps.fetchEndpoint].name); }
  if(k==="Enter") runFetch();
}
async function runFetch(){
  const ep=FETCH_ENDPOINTS[S.caps.fetchEndpoint], out=el("nf-out");
  set("nf-st","…"); set("nf-ms","…"); set("nf-by","…");
  if(out) out.innerHTML='<span class="empty">requesting…</span>';
  const ctrl=new AbortController(), to=setTimeout(()=>ctrl.abort(),8000), t0=performance.now();
  try{
    const r=await fetch(ep.url(),{signal:ctrl.signal,cache:"no-store"});
    const text=await r.text(); clearTimeout(to);
    set("nf-st", r.status+" "+(r.statusText||"OK"));
    set("nf-ms", Math.round(performance.now()-t0));
    set("nf-by", text.length);
    if(out) out.innerHTML='<span class="t">first bytes:</span> '+escapeHtml(text.slice(0,80));
  }catch(e){
    clearTimeout(to);
    set("nf-st","FAILED"); set("nf-ms",Math.round(performance.now()-t0));
    if(out) out.innerHTML='<span class="t">error:</span> '+escapeHtml(e.name+" "+e.message);
  }
}

/* ---- Raw Key Logger: surfaces ANY input, incl. undocumented gestures ---- */
function renderKeylog(){
  setHint("Logs ANY key · <b>Enter ×2</b> = Back");
  content.innerHTML=`
    <div class="screen-title">Raw Key Logger</div>
    <div class="gray">⚠ Captures every key — reveals undocumented inputs</div>
    <div class="loglist" id="kl-out"></div>`;
  paintKeylog();
}
function logRawKey(e,phase){
  const c=S.caps; let dur="";
  if(phase==="down"){ if(!e.repeat) c.keyDownAt[e.code]=performance.now(); }
  else { const t=c.keyDownAt[e.code]; if(t){ dur=" "+Math.round(performance.now()-t)+"ms"; delete c.keyDownAt[e.code]; } }
  c.keys.push({phase,key:e.key,code:e.code,kc:e.keyCode,rep:e.repeat,dur});
  if(c.keys.length>40) c.keys.shift();
  paintKeylog();
}
function paintKeylog(){
  const out=el("kl-out"); if(!out) return;
  const c=S.caps;
  if(!c.keys.length){ out.innerHTML='<span class="empty">press anything — arrows, and any hidden gestures…</span>'; return; }
  out.innerHTML=c.keys.slice(-9).map(e=>{
    const tag=e.phase==="down"?"▼":"▲";
    return `${tag} <b>${escapeHtml(e.key)}</b> <span class="t">code=${escapeHtml(e.code)} kc=${e.kc}${e.rep?" repeat":""}${e.dur}</span>`;
  }).join("<br>");
}
function onKeylog(k){
  // Arrows are intentionally NOT navigation here — they must stay loggable. Exit = double Enter.
  if(k==="Enter"){ const now=performance.now(); if(now-S.lastEnter<450) back(); S.lastEnter=now; }
}

/* =========================================================================
 * BOOT
 * ========================================================================= */
(function boot(){
  try{
    const l=parseInt(localStorage.getItem("mrbd_launches")||"0",10)+1;
    localStorage.setItem("mrbd_launches",String(l));
  }catch(e){/* storage may be blocked; ignore */}
  render();
})();
</script>
